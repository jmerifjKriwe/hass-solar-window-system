repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: quality-gate
        name: Quality Gate
        entry: scripts/quality-gate.sh
        language: system
        pass_filenames: false
        always_run: true
