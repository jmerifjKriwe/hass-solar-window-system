name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Commit Messages
        run: |
          # Get all commits in this PR or push
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, check commits since the base branch
            commits=$(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.sha }})
          else
            # For pushes to main, check the last 10 commits
            commits=$(git log -10 --pretty=format:%H)
          fi

          echo "Checking commits:"
          echo "$commits"

          # Conventional commit regex (matches release-please expectations)
          # Format: type(scope): description (no space before parentheses!)
          regex="^(feat|fix|docs|style|refactor|perf|test|chore|ci|revert|build)(\([a-zA-Z0-9_-]+\))?: .+"

          failed=0
          for commit in $commits; do
            msg=$(git log -1 --pretty=format:%s "$commit")
            echo "Checking: $msg"

            if [[ ! $msg =~ $regex ]]; then
              echo "❌ Invalid commit message: $msg"
              echo ""
              echo "Commit messages must follow the Conventional Commits format:"
              echo "  type(scope): description"
              echo ""
              echo "Valid types: feat, fix, docs, style, refactor, perf, test, chore, ci, revert, build"
              echo ""
              echo "Rules:"
              echo "  - Type must be lowercase"
              echo "  - No space before parentheses in scope"
              echo "  - Must have colon followed by space after type/scope"
              echo "  - Description at least 3 characters"
              echo ""
              echo "Examples:"
              echo "  feat(coordinator): add diffuse radiation estimation"
              echo "  fix(sensor): resolve device info missing"
              echo "  docs(readme): update installation instructions"
              echo "  ci(workflow): upgrade to python 3.13"
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            echo ""
            echo "❌ Commit message validation failed!"
            echo "Please amend your commits to follow the Conventional Commits format."
            exit 1
          fi

          echo "✅ All commit messages are valid!"
